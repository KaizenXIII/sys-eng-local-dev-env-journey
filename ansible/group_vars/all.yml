---
# Credentials (single source of truth — referenced by Makefile and scripts via env vars)
lab_splunk_password: "ChangeMeNow1!"
lab_root_password: "changeme"
lab_hec_token: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

# Network
lab_network: lab-network
lab_subnet: "10.89.0.0/24"

# Node IPs on the Podman network
node_ips:
  node1: "10.89.0.11"
  node2: "10.89.0.12"
  node3: "10.89.0.13"

# Splunk
splunk_ip: "10.89.0.10"
splunk_indexer_host: "10.89.0.10"
splunk_indexer_port: "9997"
splunk_admin_password: "{{ lab_splunk_password }}"
splunk_index: "ping_data"

# Splunk Universal Forwarder
splunk_uf_version: "10.0.1"
splunk_uf_build: "c486717c322b"
splunk_uf_arch: "arm64"  # auto-detected by Makefile; override with: make install-uf SPLUNK_UF_ARCH=amd64
