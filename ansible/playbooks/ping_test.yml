---
- name: ICMP Ping Test Between Lab Nodes
  hosts: lab_nodes
  become: yes

  tasks:
    - name: Ensure ping log directory exists
      file:
        path: "{{ ping_log_dir }}"
        state: directory
        mode: "0755"

    - name: Run ICMP ping to all other nodes
      shell: |
        LOGFILE="{{ ping_log_dir }}/ping_{{ inventory_hostname }}_$(date -u '+%Y%m%d_%H%M%S').log"
        echo "=== Ping from {{ inventory_hostname }} to {{ item.key }} ({{ item.value }}) at $(date -u '+%Y-%m-%dT%H:%M:%SZ') ===" >> "$LOGFILE"
        ping -c {{ ping_count }} {{ item.value }} 2>&1 >> "$LOGFILE"
        echo "" >> "$LOGFILE"
      loop: "{{ node_ips | dict2items }}"
      when: item.key != inventory_hostname
      register: ping_results
      ignore_errors: yes

    - name: Show latest ping log
      shell: cat "$(ls -t {{ ping_log_dir }}/ping_{{ inventory_hostname }}_*.log | head -1)"
      register: log_output

    - name: Display ping results
      debug:
        var: log_output.stdout_lines
