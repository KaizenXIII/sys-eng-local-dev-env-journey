[supervisord]
nodaemon = True
umask = 022
logfile = /dev/stdout
logfile_maxbytes = 0
pidfile = /var/run/supervisor/supervisor.task.pid

[program:receptor]
command = /usr/local/bin/receptor --config /etc/receptor/receptor.conf
autorestart = true
startsecs = 1
startretries = 5
stopasgroup = true
killasgroup = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 1

[program:dispatcher]
command = awx-manage run_dispatcher
directory = /var/lib/awx
autorestart = true
startsecs = 30
startretries = 10
stopasgroup = true
killasgroup = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 10

[program:wsrelay]
command = awx-manage run_wsrelay
directory = /var/lib/awx
autorestart = true
stopasgroup = true
killasgroup = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 10

[program:callback-receiver]
command = awx-manage run_callback_receiver
directory = /var/lib/awx
autorestart = true
startsecs = 30
startretries = 10
stopasgroup = true
killasgroup = true
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
priority = 10

[group:tower-processes]
programs = receptor,dispatcher,callback-receiver,wsrelay
priority = 5


# Superwatcher disabled — kills all processes on first FATAL, too aggressive for compose
# [eventlistener:superwatcher]
# command = stop-supervisor
# events = PROCESS_STATE_FATAL

[unix_http_server]
file = /var/run/supervisor/supervisor.task.sock

[supervisorctl]
serverurl = unix:///var/run/supervisor/supervisor.task.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
